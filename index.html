<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="manifest" href="manifest.json">

<body style="background-color: #000; margin: 0; color: #fff;">
    <!-- Tela de Abertura (Splash) -->
    <div id="splash" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s;">
        <div style="text-align: center;">
            <svg style="width: 80px; height: 80px; margin-bottom: 20px;" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                <line x1="6" y1="1" x2="6" y2="4"></line>
                <line x1="10" y1="1" x2="10" y2="4"></line>
                <line x1="14" y1="1" x2="14" y2="4"></line>
            </svg>
            <h1 style="font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; margin: 0;">Superjoint Ritual</h1>
            <span style="font-size: 0.6rem; color: #C9A227; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; display: block; opacity: 0.6;">Versão Beta</span>
        </div>
    </div>
